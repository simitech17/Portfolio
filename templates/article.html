<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} – Simone Colavecchia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .article-hero {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 40px 40px;
        }

        .article-body {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 40px 100px;
        }

        .article-body p {
            font-size: 18px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 24px;
        }

        .article-body h2 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin: 40px 0 16px;
        }

        .article-topic {
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(120, 80, 255, 0.9);
            margin-bottom: 16px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/">Home</a>
        <a href="/publications">Publications</a>
        <a href="/#contact">Contact</a>
        <a href="/download/cv" class="nav-cv">Download CV ↓</a>
    </nav>

    <div class="article-hero">
        <a href="/publications" class="back-link" style="display:inline-block; color:rgba(255,255,255,0.4); 
           text-decoration:none; font-size:14px; margin-bottom:30px;">
            ← Back to publications
        </a>
        <p class="article-topic">{{ post.topic }}</p>
        <h1 style="font-size: 40px; line-height: 1.2; margin-bottom: 20px;">
            {{ post.title }}
        </h1>
        <div style="height: 0.5px; background: linear-gradient(90deg, 
             rgba(120,80,255,0.6), rgba(0,180,255,0.6), transparent); 
             margin-top: 30px;">
        </div>
    </div>

    <div class="article-body">
        {{ post.content | safe }}
    </div>

</body>

</html>
